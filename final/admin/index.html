<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PMAA Admin</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Satoshi","Noto Sans KR",system-ui,sans-serif;background:#f4f5f7;color:#18212d;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#fff;border-radius:20px;padding:48px 40px;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.login-box h1{font-size:24px;font-weight:700;margin-bottom:8px;letter-spacing:-.02em}
.login-box p{font-size:14px;color:#9ca3af;margin-bottom:32px}
.login-box input{width:100%;padding:14px 16px;border:1px solid #e5e7eb;border-radius:12px;font-size:16px;outline:none;transition:border .2s}
.login-box input:focus{border-color:#1a55f9}
.login-box button{width:100%;padding:14px;background:#18212d;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px;transition:background .2s}
.login-box button:hover{background:#1a55f9}
.login-error{color:#ef4444;font-size:13px;margin-top:12px;display:none}
.admin{display:none;max-width:960px;margin:0 auto;padding:32px 20px}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.admin-header h1{font-size:28px;font-weight:700;letter-spacing:-.02em}
.admin-header .logout{padding:10px 20px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;cursor:pointer;font-weight:500;transition:all .2s}
.admin-header .logout:hover{border-color:#ef4444;color:#ef4444}
.stats{display:flex;gap:16px;margin-bottom:28px}
.stat-card{flex:1;background:#fff;border-radius:14px;padding:20px 24px;border:1px solid #e5e7eb}
.stat-card .num{font-size:32px;font-weight:700;color:#18212d}
.stat-card .label{font-size:13px;color:#9ca3af;margin-top:4px}
.stat-card.unread .num{color:#1a55f9}
.inquiry-list{display:flex;flex-direction:column;gap:12px}
.inquiry-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px;cursor:pointer;transition:all .2s}
.inquiry-card:hover{border-color:#1a55f9;box-shadow:0 4px 16px rgba(26,85,249,.06)}
.inquiry-card.unread{border-left:3px solid #1a55f9}
.inquiry-card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.inquiry-card .name{font-size:17px;font-weight:600}
.inquiry-card .date{font-size:13px;color:#9ca3af}
.inquiry-card .meta{display:flex;gap:16px;font-size:13px;color:#4a4f54;margin-bottom:10px}
.inquiry-card .preview{font-size:14px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{display:inline-block;padding:2px 8px;background:#1a55f9;color:#fff;border-radius:6px;font-size:11px;font-weight:600;margin-left:8px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:20px;max-width:560px;width:100%;max-height:80vh;overflow-y:auto;padding:36px}
.modal .close{float:right;background:none;border:none;font-size:24px;cursor:pointer;color:#9ca3af;line-height:1}
.modal h2{font-size:20px;font-weight:700;margin-bottom:24px}
.modal .field{margin-bottom:20px}
.modal .field label{display:block;font-size:12px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;font-weight:600}
.modal .field .val{font-size:15px;line-height:1.6;color:#18212d;word-break:break-word}
.modal .field .val.msg{background:#f9fafb;padding:16px;border-radius:12px;white-space:pre-wrap}
.empty{text-align:center;padding:80px 20px;color:#9ca3af;font-size:16px}
@media(max-width:640px){
  .stats{flex-direction:column}
  .admin-header h1{font-size:22px}
  .modal{padding:24px}
}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h1>PMAA Admin</h1>
    <p>문의사항 관리 페이지입니다</p>
    <form id="loginForm">
      <input type="password" id="pwInput" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      <button type="submit">로그인</button>
      <div class="login-error" id="loginError">비밀번호가 올바르지 않습니다</div>
    </form>
  </div>
</div>

<div class="admin" id="adminPanel">
  <div class="admin-header">
    <h1>문의사항 관리</h1>
    <button class="logout" id="logoutBtn">로그아웃</button>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="num" id="totalCount">0</div><div class="label">전체 문의</div></div>
    <div class="stat-card unread"><div class="num" id="unreadCount">0</div><div class="label">읽지 않음</div></div>
  </div>
  <div class="inquiry-list" id="inquiryList">
    <div class="empty">문의사항이 없습니다</div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close" id="modalClose">&times;</button>
    <h2>문의 상세</h2>
    <div class="field"><label>이름</label><div class="val" id="dName"></div></div>
    <div class="field"><label>이메일</label><div class="val" id="dEmail"></div></div>
    <div class="field"><label>연락처</label><div class="val" id="dPhone"></div></div>
    <div class="field"><label>문의 내용</label><div class="val msg" id="dMsg"></div></div>
    <div class="field"><label>접수일</label><div class="val" id="dDate"></div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://api.hsweb.pics';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNjQxNzY5MjAwLCJleHAiOjE3OTk1MzU2MDB9.pei5Gx1wqEkbcDs1CiHFuTWNuVRlcrG5dPmYdrAqDdY';
const PASSWORD_HASH = '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4'; // sha256 of "1234"

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function apiGet(path) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Accept-Profile': 'pmaa_pilates' }
  });
  return res.json();
}

async function apiPatch(path, data) {
  await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Profile': 'pmaa_pilates', 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// Login
if (sessionStorage.getItem('pmaa_auth') === 'ok') showAdmin();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const hash = await sha256(document.getElementById('pwInput').value);
  if (hash === PASSWORD_HASH) {
    sessionStorage.setItem('pmaa_auth', 'ok');
    showAdmin();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('pmaa_auth');
  location.reload();
});

async function showAdmin() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  await loadInquiries();
}

async function loadInquiries() {
  const data = await apiGet('inquiries?order=created_at.desc');
  const list = document.getElementById('inquiryList');
  const total = data.length;
  const unread = data.filter(d => !d.is_read).length;

  document.getElementById('totalCount').textContent = total;
  document.getElementById('unreadCount').textContent = unread;

  if (!total) { list.innerHTML = '<div class="empty">문의사항이 없습니다</div>'; return; }

  list.innerHTML = data.map(d => `
    <div class="inquiry-card ${d.is_read ? '' : 'unread'}" data-id="${d.id}">
      <div class="top">
        <span class="name">${escapeHtml(d.name)}${d.is_read ? '' : '<span class="badge">NEW</span>'}</span>
        <span class="date">${formatDate(d.created_at)}</span>
      </div>
      <div class="meta">
        <span>${escapeHtml(d.email)}</span>
        <span>${escapeHtml(d.phone)}</span>
      </div>
      <div class="preview">${escapeHtml(d.message)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.inquiry-card').forEach(card => {
    card.addEventListener('click', () => openDetail(data.find(d => d.id == card.dataset.id)));
  });
}

async function openDetail(d) {
  document.getElementById('dName').textContent = d.name;
  document.getElementById('dEmail').textContent = d.email;
  document.getElementById('dPhone').textContent = d.phone;
  document.getElementById('dMsg').textContent = d.message;
  document.getElementById('dDate').textContent = formatDate(d.created_at);
  document.getElementById('modal').classList.add('active');

  if (!d.is_read) {
    await apiPatch('inquiries?id=eq.' + d.id, { is_read: true });
    d.is_read = true;
    await loadInquiries();
  }
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('active');
});
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
});
</script>
</body>
</html>
